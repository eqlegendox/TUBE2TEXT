<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TUBE2TEXT</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <img src="icons/icon48.png" width="24" height="24" alt="TUBE2TEXT" />
        <span>TUBE<span style="color:#ff4444;">2</span>TEXT</span>
      </div>
    </header>

    <main>
      <!-- Not on YouTube state -->
      <div id="state-not-youtube" class="state hidden">
        <div class="empty-state">
          <p>Navigate to a YouTube video to use this extension.</p>
        </div>
      </div>

      <!-- Ready state -->
      <div id="state-ready" class="state hidden">
        <div class="video-info">
          <p class="video-id-label">Video ID: <span id="video-id-display"></span></p>
        </div>
        <button id="summarize-btn" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z" fill="currentColor"/>
          </svg>
          Generate Notes &amp; Save to Notion
        </button>
      </div>

      <!-- Loading state -->
      <div id="state-loading" class="state hidden">
        <div class="loading-container">
          <div class="spinner"></div>
          <p id="loading-message">Fetching transcript...</p>
        </div>
      </div>

      <!-- Result state -->
      <div id="state-result" class="state hidden">
        <div class="result-header">
          <h2 id="result-title"></h2>
          <a id="notion-link" href="#" target="_blank" class="notion-badge hidden">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M4.459 4.208c.746.606 1.026.56 2.428.466l13.215-.793c.28 0 .047-.28-.046-.326L17.86 1.968c-.42-.326-.981-.7-2.055-.607L3.01 2.295c-.466.046-.56.28-.374.466zm.793 3.08v13.904c0 .747.373 1.027 1.214.98l14.523-.84c.841-.046.935-.56.935-1.167V6.354c0-.606-.233-.933-.748-.887l-15.177.887c-.56.047-.747.327-.747.933zm14.337.745c.093.42 0 .84-.42.888l-.7.14v10.264c-.608.327-1.168.514-1.635.514-.748 0-.935-.234-1.495-.933l-4.577-7.186v6.952L12.21 19s0 .84-1.168.84l-3.222.186c-.093-.186 0-.653.327-.746l.84-.233V9.854L7.822 9.76c-.094-.42.14-1.026.793-1.073l3.456-.233 4.764 7.279v-6.44l-1.215-.139c-.093-.514.28-.887.747-.933zM1.936 1.035l13.31-.98c1.634-.14 2.055-.047 3.082.7l4.249 2.986c.7.513.934.653.934 1.213v16.378c0 1.026-.373 1.634-1.68 1.726l-15.458.934c-.98.047-1.448-.093-1.962-.747l-3.129-4.06c-.56-.747-.793-1.306-.793-1.96V2.667c0-.839.374-1.54 1.447-1.632z"/>
            </svg>
            Open in Notion
          </a>
        </div>

        <div id="notion-error-banner" class="notion-error hidden"></div>
        <div id="truncated-banner" class="truncated-warning hidden">⚠ Long video: notes cover the first ~20 minutes. Groq free tier has a token limit.</div>

        <section class="section">
          <h3 class="section-title">Overview</h3>
          <p id="result-overview" class="overview-text"></p>
        </section>

        <section class="section">
          <h3 class="section-title">Notes</h3>
          <div id="result-sections"></div>
        </section>

        <div class="result-actions">
          <button id="summarize-again-btn" class="btn btn-secondary">Generate Again</button>
        </div>
      </div>

      <!-- Error state -->
      <div id="state-error" class="state hidden">
        <div class="error-container">
          <p id="error-message" class="error-text"></p>
          <button id="retry-btn" class="btn btn-secondary">Try Again</button>
        </div>
      </div>
    </main>
  </div>

  <script src="popup.js"></script>
</body>
</html>
